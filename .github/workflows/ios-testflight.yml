name: iOS TestFlight

on:
  workflow_dispatch:
  push:
    branches: ["main"]

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
        working-directory: ios
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
      FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      TESTFLIGHT_GROUPS: ${{ secrets.TESTFLIGHT_GROUPS }}
      BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL }}
      BUNDLE_GEMFILE: ${{ github.workspace }}/ios/Gemfile
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - uses: actions/checkout@v4

      - name: Keep runner awake
        run: |
          caffeinate -dimsu &
          echo "Started caffeinate to reduce self-hosted runner sleep during archive/upload."

      - name: Prepare keychain for codesign
        shell: bash
        run: |
          if [[ -z "${MAC_KEYCHAIN_PASSWORD:-}" ]]; then
            echo "MAC_KEYCHAIN_PASSWORD is not set on the self-hosted runner." >&2
            exit 1
          fi

          security list-keychains -d user -s "${HOME}/Library/Keychains/login.keychain-db" "/Library/Keychains/System.keychain"
          security default-keychain -d user -s "${HOME}/Library/Keychains/login.keychain-db"
          security unlock-keychain -p "${MAC_KEYCHAIN_PASSWORD}" "${HOME}/Library/Keychains/login.keychain-db"
          security set-keychain-settings -lut 21600 "${HOME}/Library/Keychains/login.keychain-db"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${MAC_KEYCHAIN_PASSWORD}" "${HOME}/Library/Keychains/login.keychain-db"

      - name: Install Ruby gems
        shell: bash
        run: |
          ruby -v
          gem -v
          gem install bundler -v 2.4.22 --no-document --user-install
          export PATH="$HOME/.gem/ruby/$(ruby -e 'print RbConfig::CONFIG[\"ruby_version\"]')/bin:$PATH"
          bundle _2.4.22_ config set path vendor/bundle
          bundle _2.4.22_ install --jobs 4 --retry 3

      - name: Prepare App Store Connect key
        shell: bash
        run: |
          if [[ -n "${APP_STORE_CONNECT_PRIVATE_KEY}" && -n "${APP_STORE_CONNECT_KEY_ID}" ]]; then
            key_path="${RUNNER_TEMP}/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
            printf '%s' "${APP_STORE_CONNECT_PRIVATE_KEY}" > "${key_path}"
            echo "APP_STORE_CONNECT_KEY_PATH=${key_path}" >> "${GITHUB_ENV}"
          elif [[ -n "${APP_STORE_CONNECT_KEY_ID}" && -f "${HOME}/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" ]]; then
            echo "APP_STORE_CONNECT_KEY_PATH=${HOME}/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" >> "${GITHUB_ENV}"
          fi

      - name: Ensure App Store resources
        if: ${{ env.APP_STORE_CONNECT_KEY_PATH != '' && env.APP_STORE_CONNECT_ISSUER_ID != '' && env.APP_STORE_CONNECT_KEY_ID != '' }}
        shell: bash
        working-directory: .
        run: |
          python3 -m pip install --quiet pyjwt requests cryptography || true
          python3 scripts/ensure_appstore_resources.py \
            --bundle-id com.we555.test-evowit \
            --app-name test-evowit \
            --sku test-evowit \
            --profile-name "test-evowit App Store" \
            --output-profile "${HOME}/Library/MobileDevice/Provisioning Profiles/test-evowit-appstore.mobileprovision"

      - name: Build and upload
        shell: bash
        run: |
          export PATH="$HOME/.gem/ruby/$(ruby -e 'print RbConfig::CONFIG[\"ruby_version\"]')/bin:$PATH"
          bundle _2.4.22_ exec fastlane beta

      - name: Distribute build to beta groups
        if: ${{ env.APP_STORE_CONNECT_KEY_PATH != '' && env.APP_STORE_CONNECT_ISSUER_ID != '' && env.APP_STORE_CONNECT_KEY_ID != '' }}
        shell: bash
        working-directory: .
        run: |
          python3 -m pip install --quiet pyjwt requests cryptography || true
          python3 scripts/distribute_testflight_build.py --bundle-id com.we555.test-evowit --all-groups

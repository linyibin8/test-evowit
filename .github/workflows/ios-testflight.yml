name: iOS TestFlight

on:
  workflow_dispatch:
  push:
    branches: ["main"]

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
        working-directory: ios
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
      FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      TESTFLIGHT_GROUPS: ${{ secrets.TESTFLIGHT_GROUPS }}
      BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios

      - name: Prepare App Store Connect key
        shell: bash
        run: |
          if [[ -n "${APP_STORE_CONNECT_PRIVATE_KEY}" && -n "${APP_STORE_CONNECT_KEY_ID}" ]]; then
            key_path="${RUNNER_TEMP}/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
            printf '%s' "${APP_STORE_CONNECT_PRIVATE_KEY}" > "${key_path}"
            echo "APP_STORE_CONNECT_KEY_PATH=${key_path}" >> "${GITHUB_ENV}"
          elif [[ -n "${APP_STORE_CONNECT_KEY_ID}" && -f "${HOME}/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" ]]; then
            echo "APP_STORE_CONNECT_KEY_PATH=${HOME}/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" >> "${GITHUB_ENV}"
          fi

      - name: Build and upload
        shell: bash
        run: bundle exec fastlane beta

      - name: Add build to all external groups
        if: ${{ env.APP_STORE_CONNECT_KEY_PATH != '' && env.APP_STORE_CONNECT_ISSUER_ID != '' && env.APP_STORE_CONNECT_KEY_ID != '' }}
        shell: bash
        working-directory: .
        run: |
          python3 -m pip install --quiet pyjwt requests cryptography || true
          python3 - <<'PY'
          import json
          import os
          import time
          import requests
          import jwt

          key_id = os.environ["APP_STORE_CONNECT_KEY_ID"]
          issuer_id = os.environ["APP_STORE_CONNECT_ISSUER_ID"]
          key_path = os.environ["APP_STORE_CONNECT_KEY_PATH"]
          bundle_id = "com.we555.test-evowit"

          with open(key_path, "r", encoding="utf-8") as handle:
              private_key = handle.read()

          token = jwt.encode(
              {
                  "iss": issuer_id,
                  "iat": int(time.time()),
                  "exp": int(time.time()) + 600,
                  "aud": "appstoreconnect-v1"
              },
              private_key,
              algorithm="ES256",
              headers={"kid": key_id}
          )

          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json"
          }

          builds_response = requests.get(
              "https://api.appstoreconnect.apple.com/v1/builds",
              headers=headers,
              params={
                  "sort": "-uploadedDate",
                  "limit": 20,
                  "include": "app"
              },
              timeout=30
          )
          builds_response.raise_for_status()
          builds = builds_response.json().get("data", [])

          included_apps = {
              item["id"]: item
              for item in builds_response.json().get("included", [])
              if item.get("type") == "apps"
          }

          target_build = None
          for build in builds:
              relationships = build.get("relationships", {})
              app_data = relationships.get("app", {}).get("data")
              if not app_data:
                  continue
              app_info = included_apps.get(app_data["id"])
              if not app_info:
                  continue
              if app_info.get("attributes", {}).get("bundleId") == bundle_id:
                  target_build = build
                  break

          if not target_build:
              raise SystemExit("No uploaded build found for com.we555.test-evowit")

          build_id = target_build["id"]

          patch_payload = {
              "data": {
                  "type": "builds",
                  "id": build_id,
                  "attributes": {
                      "usesNonExemptEncryption": False
                  }
              }
          }
          requests.patch(
              f"https://api.appstoreconnect.apple.com/v1/builds/{build_id}",
              headers=headers,
              data=json.dumps(patch_payload),
              timeout=30
          )

          groups_response = requests.get(
              "https://api.appstoreconnect.apple.com/v1/betaGroups",
              headers=headers,
              timeout=30
          )
          groups_response.raise_for_status()

          for group in groups_response.json().get("data", []):
              attributes = group.get("attributes", {})
              if attributes.get("isInternalGroup", True):
                  continue
              payload = {"data": [{"type": "builds", "id": build_id}]}
              response = requests.post(
                  f"https://api.appstoreconnect.apple.com/v1/betaGroups/{group['id']}/relationships/builds",
                  headers=headers,
                  data=json.dumps(payload),
                  timeout=30
              )
              print(attributes.get("name"), response.status_code)
          PY

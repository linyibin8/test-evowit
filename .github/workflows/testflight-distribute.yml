name: TestFlight Distribute

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/testflight-distribute.yml"
      - "scripts/distribute_testflight_build.py"
  workflow_dispatch:
    inputs:
      build_version:
        description: Build number to distribute
        required: true
        default: "2"
      short_version:
        description: Marketing version to distribute
        required: true
        default: "1.0.0"
      all_groups:
        description: Add build to every beta group
        required: true
        default: "true"

jobs:
  distribute:
    runs-on: [self-hosted, macOS, ARM64]
    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      TESTFLIGHT_GROUPS: ${{ secrets.TESTFLIGHT_GROUPS }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: python3 -m pip install --quiet pyjwt requests cryptography

      - name: Prepare App Store Connect key
        run: |
          if [[ -n "${APP_STORE_CONNECT_PRIVATE_KEY}" && -n "${APP_STORE_CONNECT_KEY_ID}" ]]; then
            key_path="${RUNNER_TEMP}/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
            printf '%s' "${APP_STORE_CONNECT_PRIVATE_KEY}" > "${key_path}"
            echo "APP_STORE_CONNECT_KEY_PATH=${key_path}" >> "${GITHUB_ENV}"
          elif [[ -n "${APP_STORE_CONNECT_KEY_ID}" && -f "${HOME}/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" ]]; then
            echo "APP_STORE_CONNECT_KEY_PATH=${HOME}/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" >> "${GITHUB_ENV}"
          fi

      - name: Distribute build to beta groups
        env:
          INPUT_ALL_GROUPS: ${{ github.event.inputs.all_groups }}
          INPUT_BUILD_VERSION: ${{ github.event.inputs.build_version }}
          INPUT_SHORT_VERSION: ${{ github.event.inputs.short_version }}
        run: |
          build_version="${INPUT_BUILD_VERSION:-}"
          short_version="${INPUT_SHORT_VERSION:-}"
          if [[ -z "${build_version}" ]]; then
            build_version="$(python3 - <<'PY'
            from pathlib import Path
            import re

            text = Path("ios/project.yml").read_text(encoding="utf-8")
            match = re.search(r"CURRENT_PROJECT_VERSION:\s*(\d+)", text)
            if not match:
                raise SystemExit("CURRENT_PROJECT_VERSION not found in ios/project.yml")
            print(match.group(1))
            PY
            )"
          fi
          if [[ -z "${short_version}" ]]; then
            short_version="$(python3 - <<'PY'
            from pathlib import Path
            import re

            text = Path("ios/project.yml").read_text(encoding="utf-8")
            match = re.search(r"MARKETING_VERSION:\s*([^\s]+)", text)
            if not match:
                raise SystemExit("MARKETING_VERSION not found in ios/project.yml")
            print(match.group(1))
            PY
            )"
          fi
          args=(scripts/distribute_testflight_build.py --bundle-id com.we555.test-evowit)
          if [[ -n "${build_version}" ]]; then
            args+=(--build-version "${build_version}")
          fi
          if [[ -n "${short_version}" ]]; then
            args+=(--short-version "${short_version}")
          fi
          if [[ "${INPUT_ALL_GROUPS}" == "true" ]]; then
            args+=(--all-groups)
          elif [[ -n "${TESTFLIGHT_GROUPS}" ]]; then
            args+=(--group-names "${TESTFLIGHT_GROUPS}")
          fi
          args+=(--wait-for-processing --wait-timeout 1800)
          python3 "${args[@]}"

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>test-evowit 拍照解题调试页</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">test-evowit Demo</p>
      <h1>拍一张题目，拿到答案、步骤和完整讲解。</h1>
      <p class="lede">
        这是给 iPhone 学生端配套的调试页面。你可以先上传题目图片，确认后端识题和讲解质量，
        也可以打开 <a href="/debug.html">Trace 日志页</a> 查看每一题到底走了哪条链路。
      </p>
    </section>

    <section class="panel">
      <form id="solver-form" class="solver-form">
        <label>
          学科
          <select id="subject">
            <option value="math" selected>数学</option>
            <option value="chinese">语文</option>
            <option value="english">英语</option>
            <option value="science">科学</option>
            <option value="general">通用</option>
          </select>
        </label>

        <label>
          年级
          <input id="gradeBand" value="初中" />
        </label>

        <label>
          讲解风格
          <select id="answerStyle">
            <option value="guided" selected>启发式讲解</option>
            <option value="detailed">详细解析</option>
            <option value="direct">直接答案</option>
          </select>
        </label>

        <label>
          补充说明
          <textarea id="questionHint" rows="3" placeholder="比如：只想看思路，不要太难；这是几何证明题。"></textarea>
        </label>

        <label>
          手动题干
          <textarea id="recognizedText" rows="4" placeholder="如果想跳过 OCR，或者想直接验证文本链路，可以把题干粘贴在这里。"></textarea>
        </label>

        <label>
          上传题目图片
          <input id="imageInput" type="file" accept="image/*" required />
        </label>

        <button type="submit">开始解题</button>
      </form>

      <section id="result" class="result">
        <p class="placeholder">结果会显示在这里。</p>
      </section>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>

name: test-evowit
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.0
    MARKETING_VERSION: 2.0.0
    CURRENT_PROJECT_VERSION: 2026041704
    DEVELOPMENT_TEAM: 76PHSCHPCK
    CODE_SIGN_STYLE: Automatic
    ALWAYS_SEARCH_USER_PATHS: NO
  configs:
    Debug:
      CODE_SIGN_STYLE: Automatic
    Release:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: Apple Distribution
      PROVISIONING_PROFILE_SPECIFIER: test-evowit App Store
packages: {}
schemes:
  TestEvowit:
    build:
      targets:
        TestEvowit: all
targets:
  TestEvowit:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - TestEvowit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.we555.test-evowit
        INFOPLIST_FILE: TestEvowit/Info.plist
        PRODUCT_NAME: test-evowit
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: TestEvowit/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: test-evowit
        UILaunchScreen: {}
        NSCameraUsageDescription: 允许使用相机实时识别题目，并裁切当前单题画面。
        NSPhotoLibraryUsageDescription: 允许从相册导入题目图片并识别单题内容。
        ITSAppUsesNonExemptEncryption: false
